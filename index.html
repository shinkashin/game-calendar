* { margin: 0; padding: 0; box-sizing: border-box; }
body {

  background: #0d1117; color: #c9d1d9;
  padding: 16px 24px 40px; min-width: 1350px;
}
.month-nav {
  position: sticky; top: 0; background: #0d1117;
  padding: 10px 0 14px; border-bottom: 1px solid #30363d;
  z-index: 100; display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.month-nav a {
  color: #8b949e; text-decoration: none; padding: 5px 14px;
  border-radius: 6px; background: #161b22; font-size: 13px; font-weight: 500;
  transition: all 0.15s; border: 1px solid #21262d; cursor: pointer;
}
.month-nav a:hover, .month-nav a.active {
  background: #1f6feb; color: #fff; border-color: #1f6feb;
}
.month-section { margin-bottom: 40px; }
.month-header {
  font-size: 22px; font-weight: 700; color: #e6edf3;
  margin-bottom: 14px; padding-left: 4px; display: flex; align-items: center; gap: 10px;
}
.month-header .year-tag {
  font-size: 13px; font-weight: 500; color: #8b949e; background: #21262d;
  padding: 2px 8px; border-radius: 4px;
}
.calendar-table {
  width: 100%; border-collapse: collapse; table-layout: fixed;
  border-radius: 10px; overflow: hidden; border: 1px solid #30363d;
}
.calendar-table thead th {
  background: #161b22; color: #8b949e; font-size: 13px; font-weight: 600;
  padding: 8px 4px; text-align: center; border-bottom: 1px solid #30363d; width: 15%;
}
.calendar-table thead th.weekend {
  background: #1a1f26; color: #f0883e; width: 8.5%;
}
.calendar-table thead th.pending-header {
  width: 130px; background: #1a1f26; color: #8b949e;
}
.calendar-table tbody td {
  border: 1px solid #21262d; vertical-align: top; padding: 4px;
  height: auto; min-height: 50px; background: #0d1117;
}
.calendar-table tbody td.weekend-cell { background: #11161d; }
.calendar-table tbody td.pending-cell {
  background: #11161d; border-left: 2px solid #30363d;
}
.date-num {
  font-size: 12px; font-weight: 600; color: #6e7681;
  margin-bottom: 3px; text-align: right; padding-right: 4px;
}
.date-num.weekend { color: #f0883e; }

.game-card {
  border-radius: 5px; padding: 6px 7px; margin-bottom: 5px;
  cursor: pointer; transition: all 0.12s; position: relative;
  font-size: 12px; line-height: 1.5;
}
.game-card:hover {
  transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.35); filter: brightness(1.15);
}
.game-card .game-name {
  font-weight: 600; color: #e6edf3; font-size: 12px; line-height: 1.4; word-break: break-all;
}
.game-card .game-company {
  font-size: 10px; color: #8b949e; margin-top: 2px; line-height: 1.3; word-break: break-all;
}
.game-card .meta-row {
  display: flex; align-items: center; gap: 4px; margin-top: 4px; flex-wrap: wrap;
}
.game-card .game-type {
  font-size: 10px; color: #a0a8b0; background: rgba(255,255,255,0.08);
  padding: 1px 5px; border-radius: 3px;
}
.game-card .event-badge {
  font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600;
}
.game-card .channels {
  font-size: 9px; color: #8b949e; margin-top: 2px;
}
.game-card .key-star {
  position: absolute; top: 2px; right: 3px; color: #f0883e; font-size: 10px;
}
.game-note-tag {
  font-size: 9px; color: #ff7b72; background: rgba(255,123,114,0.15);
  display: inline-block; padding: 1px 4px; border-radius: 2px; margin-top: 3px;
  border: 1px solid rgba(255,123,114,0.3);
}
.bg-launch { background: rgba(231,76,60,0.18); border-left: 2px solid #e74c3c; }
.bg-test { background: rgba(243,156,18,0.18); border-left: 2px solid #f39c12; }
.bg-update { background: rgba(52,152,219,0.15); border-left: 2px solid #3498db; }
.bg-tbd { background: rgba(139,148,158,0.12); border-left: 2px solid #8b949e; }
.badge-launch { background: rgba(231,76,60,0.25); color: #e74c3c; }
.badge-test { background: rgba(243,156,18,0.25); color: #f39c12; }
.badge-update { background: rgba(52,152,219,0.15); color: #3498db; }
.badge-tbd { background: rgba(139,148,158,0.15); color: #8b949e; }

.update-section {
  margin-top: 16px; background: #161b22; border: 1px solid #30363d;
  border-radius: 10px; padding: 14px 18px;
}
.update-section h3 {
  font-size: 14px; color: #e6edf3; margin-bottom: 10px; font-weight: 600;
}
.update-table { width: 100%; border-collapse: collapse; }
.update-table th {
  text-align: left; font-size: 11px; color: #8b949e; font-weight: 500;
  padding: 5px 8px; border-bottom: 1px solid #30363d;
}
.update-table td {
  padding: 6px 8px; font-size: 12px; border-bottom: 1px solid #21262d;
}
.update-table td:first-child { width: 70px; color: #d29922; font-weight: 600; }

.note-section {
  margin-top: 14px; font-size: 11px; color: #ffffff; line-height: 1.8;
  background: rgba(255,255,255,0.05); padding: 10px 14px; border-radius: 8px;
}

.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s;
}
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal-box {
  background: #161b22; border: 1px solid #30363d; border-radius: 14px;
  width: 480px; max-height: 85vh; overflow-y: auto; padding: 24px;
  position: relative; transform: scale(0.95); transition: transform 0.2s;
}
.modal-overlay.active .modal-box { transform: scale(1); }
.modal-close {
  position: absolute; top: 14px; right: 16px; font-size: 22px;
  color: #8b949e; cursor: pointer; background: none; border: none;
}
.modal-close:hover { color: #fff; }
.modal-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}
.modal-header .modal-icon {
  width: 44px; height: 44px; border-radius: 10px; background: #21262d;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.modal-header .modal-title { font-size: 18px; font-weight: 700; color: #e6edf3; }
.modal-header .modal-sub { font-size: 12px; color: #8b949e; margin-top: 2px; }
.modal-row {
  display: flex; justify-content: space-between; padding: 8px 0;
  border-bottom: 1px solid #21262d; font-size: 13px;
}
.modal-row:last-child { border-bottom: none; }
.modal-row .label { color: #8b949e; }
.modal-row .value { color: #e6edf3; font-weight: 500; }
.modal-link {
  display: inline-block; margin-top: 16px; padding: 8px 16px;
  background: #1f6feb; color: #fff; text-decoration: none;
  border-radius: 6px; font-size: 13px; font-weight: 500; transition: background 0.15s;
}
.modal-link:hover { background: #388bfd; }

.reserve-chart {
  margin-top: 16px; padding: 12px; background: #0d1117;
  border-radius: 8px; border: 1px solid #21262d;
}
.reserve-chart h4 {
  font-size: 12px; color: #8b949e; margin-bottom: 8px; font-weight: 500;
}
.reserve-chart .reserve-num {
  font-size: 24px; font-weight: 700; color: #3fb950; margin-bottom: 10px;
}
.reserve-chart .reserve-trend {
  font-size: 11px; color: #8b949e; margin-bottom: 4px;
}

#svg-tooltip {
  position: absolute; background: #21262d; border: 1px solid #30363d;
  border-radius: 6px; padding: 6px 10px; font-size: 12px; color: #e6edf3;
  pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 2000; white-space: nowrap;

#svg-tooltip.show { opacity: 1; }

.legend {
  display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: #8b949e; flex-wrap: wrap;

.legend span { display: flex; align-items: center; gap: 4px; }
.legend .dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }

.top-legend {

}
.top-legend .lg { display: flex; align-items: center; gap: 5px; }
.top-legend .lg-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
</style>
</head>

const eventNames = { launch: '首发', test: '测试', update: '版本', tbd: '待定' };
const eventClasses = { launch: 'bg-launch', test: 'bg-test', update: 'bg-update', tbd: 'bg-tbd' };
const badgeClasses = { launch: 'badge-launch', test: 'badge-test', update: 'badge-update', tbd: 'badge-tbd' };
const weekNames = ['周一','周二','周三','周四','周五','周六','周日'];

function getDaysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}
function getFirstDayOfMonth(year, month) {
  let d = new Date(year, month - 1, 1).getDay();
  return d === 0 ? 6 : d - 1;
}

function renderGameCard(g) {
  const evt = eventNames[g.event] || g.event;
  const bgClass = eventClasses[g.event] || 'bg-launch';
  const badgeClass = badgeClasses[g.event] || 'badge-launch';
  const channels = Array.isArray(g.channels) ? g.channels.join('、') : g.channels;
  const star = g.isKey ? '<span class="key-star">&#9733;</span>' : '';
  const company = g.company ? '<div class="game-company">' + g.company + '</div>' : '';
  const taptapId = g.taptapId ? 'https://www.taptap.cn/app/' + g.taptapId : '';
  const note = g.note ? '<div class="game-note-tag">' + g.note + '</div>' : '';
  return '<div class="game-card ' + bgClass + '" onclick="openModalById(' + g.__id + ')">' +
    star + '<div class="game-name">' + g.name + '</div>' + company +
    '<div class="meta-row"><span class="game-type">' + g.type + '</span><span class="event-badge ' + badgeClass + '">' + evt + '</span></div>' + note + '</div>';
}

function renderMonth(key, data) {
  let html = '<div class="month-section" id="' + key + '">';
  html += '<div class="month-header">' + data.month + '月 <span class="year-tag">' + data.year + '年</span></div>';
  html += '<table class="calendar-table"><thead><tr>';
  for (let i = 0; i < 7; i++) {
    const wk = i >= 5 ? 'weekend' : '';
    html += '<th class="' + wk + '">' + weekNames[i] + '</th>';
  }
  html += '<th class="pending-header">待定/其他</th></tr></thead><tbody>';
  const days = getDaysInMonth(data.year, data.month);
  const firstDay = getFirstDayOfMonth(data.year, data.month);
  let dayGames = {};
  data.games.forEach(g => { dayGames[g.date] = dayGames[g.date] || []; dayGames[g.date].push(g); });
  let day = 1;
  const totalRows = Math.ceil((days + firstDay) / 7);
  let rowNum = 0;
  while (day <= days) {
    html += '<tr>';
    for (let i = 0; i < 7; i++) {
      if (rowNum === 0 && i < firstDay) {
        html += '<td class="weekend-cell"></td>';
        continue;
      }
      if (day > days) {
        html += '<td class="weekend-cell"></td>';
        continue;
      }
      const wk = i >= 5 ? 'weekend' : '';
      const cellClass = i >= 5 ? 'weekend-cell' : '';
      const dateKey = data.year + '-' + String(data.month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
      const games = dayGames[dateKey] || [];
      html += '<td class="' + cellClass + '"><div class="date-num ' + wk + '">' + day + '</div>';
      games.forEach(g => { html += renderGameCard(g); });
      html += '</td>';
      day++;
    }
    if (rowNum === 0) {
      html += '<td class="pending-cell" rowspan="' + totalRows + '">';
      if (data.pending && data.pending.length) {
      data.pending.forEach(g => {
        const evt = eventNames[g.event] || g.event;
        const bgClass = eventClasses[g.event] || 'bg-tbd';
        const badgeClass = badgeClasses[g.event] || 'badge-tbd';
        const channels = Array.isArray(g.channels) ? g.channels.join('、') : g.channels;
        const star = g.isKey ? '<span class="key-star">&#9733;</span>' : '';
        const company = g.company ? '<div class="game-company">' + g.company + '</div>' : '';
        const note = g.note ? '<div class="game-note-tag">' + g.note + '</div>' : '';
        const taptapId = g.taptapId ? 'https://www.taptap.cn/app/' + g.taptapId : '';
        html += '<div class="game-card ' + bgClass + '" onclick="openModalById(' + g.__id + ')">' +
          star + '<div class="game-name">' + g.name + '</div>' + company +
          '<div class="meta-row"><span class="game-type">' + g.type + '</span><span class="event-badge ' + badgeClass + '">' + evt + '</span></div>' + note + '</div>';
      });
    } else {
      html += '<div style="color:#6e7681;font-size:11px;text-align:center;padding:20px 0;">暂无</div>';
    }
    html += '</td>';
    }
    html += '</tr>';
    rowNum++;
  }
  html += '</tbody></table>';
  if (data.updates && data.updates.length) {
    html += '<div class="update-section"><h3>大版本更新</h3><table class="update-table"><tr><th>日期</th><th>游戏</th><th>更新内容</th></tr>';
    data.updates.forEach(u => {
      html += '<tr><td>' + u.date.slice(5) + '</td><td>' + u.game + '</td><td>' + u.content + '</td></tr>';
    });
    html += '</table></div>';
  }
  html += '<div class="note-section">' +
    '<strong style="color:#e6edf3;">图例说明：</strong>' +
    '<span class="dot" style="background:#e74c3c;"></span> 首发上线 ' +
    '<span class="dot" style="background:#f39c12;"></span> 测试 / 删档 ' +
    '<span class="dot" style="background:#3498db;"></span> 大版本更新 ' +
    '<span class="dot" style="background:#8b949e;"></span> 首曝 / 预约 ' +
    '<span style="color:#f1c40f;margin-left:4px;">&#9733;</span> 重点游戏<br>' +
    '数据来源：TapTap、OPPO游戏中心、各渠道后台。更新时间：每日自动更新。<br>' +
    '本表为内部监控用途，如有变动请以各渠道官方公告为准。' +
    '</div>';
  html += '</div>';
  return html;
}

function renderNav() {
  const keys = Object.keys(calendarData).sort().reverse();
  let html = '';
  keys.forEach(k => {
    const d = calendarData[k];
    html += '<a href="#' + k + '" data-month="' + k + '">' + d.year + '年' + d.month + '月</a>';
  });
  document.getElementById('monthNav').innerHTML = html;
}

function renderAll() {
  const keys = Object.keys(calendarData).sort().reverse();
  let html = '';
  keys.forEach(k => { html += renderMonth(k, calendarData[k]); });
  document.getElementById('calendarContainer').innerHTML = html;
}

function openModal(taptapUrl, name, company, type, eventType, channels, isKey, reserveNum, history, note, downloadHistory, gameDate) {
  if (typeof history === 'string') { history = history.replace(/&quot;/g, '"'); try { history = JSON.parse(history); } catch(e) { history = []; } }
  if (typeof downloadHistory === 'string') { downloadHistory = downloadHistory.replace(/&quot;/g, '"'); try { downloadHistory = JSON.parse(downloadHistory); } catch(e) { downloadHistory = []; } }
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  let star = isKey ? ' <span style="color:#f0883e;">&#9733;</span>' : '';
  let html = '<div class="modal-header">' +
    '<div class="modal-icon">&#127918;</div>' +
    '<div><div class="modal-title">' + name + star + '</div>' +
    '<div class="modal-sub">' + (company || '厂商待确认') + '</div></div></div>';
  html += '<div class="modal-row"><span class="label">游戏类型</span><span class="value">' + type + '</span></div>';
  html += '<div class="modal-row"><span class="label">事件类型</span><span class="value">' + eventType + '</span></div>';
  if (note) {
    html += '<div class="modal-row"><span class="label">特殊标记</span><span class="value" style="color:#ff7b72;">' + note + '</span></div>';
  }
  let reserveCount = reserveNum;
  if (reserveNum && reserveNum !== '—') {
    html += '<div class="reserve-chart">';
    
    // If launched and has download history, show download trend
    if (downloadHistory && downloadHistory.length > 0) {
      html += '<h4>下载趋势（首发后）</h4>';
      var dFirst = downloadHistory[0].value;
      var dLast = downloadHistory[downloadHistory.length-1].value;
      var dDiff = dLast - dFirst;
      var dDiffStr = '';
      if (dDiff > 0) dDiffStr = '<span style="color:#3fb950;font-size:12px;"> &#9650;+' + dDiff.toLocaleString() + '</span>';
      else if (dDiff < 0) dDiffStr = '<span style="color:#f85149;font-size:12px;"> &#9660;' + dDiff.toLocaleString() + '</span>';
      html += '<div class="reserve-num">' + dLast.toLocaleString() + ' 下载' + dDiffStr + '</div>';
      html += '<div class="reserve-trend">' + downloadHistory.length + '日趋势（' + downloadHistory[0].date + ' → ' + downloadHistory[downloadHistory.length-1].date + '）</div>';
      html += generateTrendChart(downloadHistory, '#58a6ff');
    }

    // Always show reservation trend if history exists (keep old data)
    if (history && history.length > 0) {
      if (downloadHistory && downloadHistory.length > 0) {
        html += '<div style="margin-top:16px;border-top:1px solid #21262d;padding-top:12px;">';
        html += '<h4 style="margin-top:0;">预约趋势（首发前）</h4>';
      } else {
        html += '<h4>TapTap 预约趋势</h4>';
      }
      html += '<div class="reserve-num">' + reserveCount + '</div>';
      if (history.length > 1) {
        var firstVal = history[0].value;
        var lastVal = history[history.length-1].value;
        var diff = lastVal - firstVal;
        var diffStr = '';
        if (diff > 0) diffStr = '<span style="color:#3fb950;font-size:12px;"> &#9650;+' + diff.toLocaleString() + '</span>';
        else if (diff < 0) diffStr = '<span style="color:#f85149;font-size:12px;"> &#9660;' + diff.toLocaleString() + '</span>';
        html += '<div style="font-size:12px;margin-top:2px;">' + diffStr + '</div>';
      }
      html += '<div class="reserve-trend">' + history.length + '日趋势（' + history[0].date + ' → ' + history[history.length-1].date + '）</div>';
      html += generateTrendChart(history, '#3fb950');
      if (downloadHistory && downloadHistory.length > 0) {
        html += '</div>';
      }
    } else if (!downloadHistory || downloadHistory.length === 0) {
      html += '<h4>TapTap 预约趋势</h4>';
      html += '<div class="reserve-num">' + reserveCount + '</div>';
      html += '<div class="reserve-trend">趋势数据将在后续每日更新中积累</div>';
    }

    html += '</div>';
  } else if (reserveNum === '—') {
    html += '<div class="reserve-chart"><h4>TapTap 预约数</h4><div style="font-size:14px;color:#8b949e;">已上线或数据未公开</div></div>';
  }
  if (taptapUrl) {
    html += '<a href="' + taptapUrl + '" target="_blank" class="modal-link">在 TapTap 查看</a>';
  }
  content.innerHTML = html;
  overlay.classList.add('active');
}

function generateTrendChart(data, color) {
  color = color || '#3fb950';
  var gradId = 'grad_' + Math.random().toString(36).slice(2,8);
  const w = 400, h = 120, pad = 20;
  const minVal = Math.min(...data.map(d => d.value));
  const maxVal = Math.max(...data.map(d => d.value));
  const range = maxVal - minVal || 1;
  const points = data.map((d, i) => {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = h - pad - ((d.value - minVal) / range) * (h - pad * 2);
    return { x, y, value: d.value, date: d.date };
  });
  let path = 'M' + points[0].x + ' ' + points[0].y;
  for (let i = 1; i < points.length; i++) path += ' L' + points[i].x + ' ' + points[i].y;
  let svg = '<svg width="100%" height="140" viewBox="0 0 ' + w + ' ' + h + '" style="overflow:visible;">';
  svg += '<defs><linearGradient id="' + gradId + '" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="' + color + '" stop-opacity="0.3"/><stop offset="100%" stop-color="' + color + '" stop-opacity="0"/></linearGradient></defs>';
  let areaPath = path + ' L' + points[points.length-1].x + ' ' + (h-pad) + ' L' + points[0].x + ' ' + (h-pad) + ' Z';
  svg += '<path d="' + areaPath + '" fill="url(#' + gradId + ')"/>';
  svg += '<path d="' + path + '" fill="none" stroke="' + color + '" stroke-width="2"/>';
  points.forEach((p, i) => {
    var dparts = p.date.split('/');
    var dlabel = dparts[0] + '月' + dparts[1] + '日';
    var vlabel = p.value >= 10000 ? (p.value/10000).toFixed(1) + '万' : p.value.toLocaleString();
    svg += '<circle cx="' + p.x + '" cy="' + p.y + '" r="4" fill="' + color + '" stroke="#0d1117" stroke-width="2" ' +
      'onmouseenter="showTooltip(evt, \'' + dlabel + ': ' + vlabel + '\')" ' +
      'onmouseleave="hideTooltip()" style="cursor:pointer;"/>';
  });
  svg += '</svg>';
  return svg;
}

function showTooltip(evt, text) {
  const tooltip = document.getElementById('svg-tooltip');
  tooltip.textContent = text;
  tooltip.classList.add('show');
  const rect = evt.target.getBoundingClientRect();
  tooltip.style.left = (rect.left + window.scrollX - 10) + 'px';
  tooltip.style.top = (rect.top + window.scrollY - 40) + 'px';
}
function hideTooltip() {
  document.getElementById('svg-tooltip').classList.remove('show');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('active');
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      document.querySelectorAll('.month-nav a').forEach(a => a.classList.remove('active'));
      const link = document.querySelector('.month-nav a[href="#' + entry.target.id + '"]');
      if (link) link.classList.add('active');
    }
  });
}, { rootMargin: '-10% 0px -80% 0px' });

document.querySelectorAll('.month-section').forEach(sec => observer.observe(sec));
